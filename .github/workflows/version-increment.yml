name: CI/CD Pipeline -> Versioning

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  increment-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Increment version
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION=$(node -p "const [major, minor, patch] = '${CURRENT_VERSION}'.split('.'); [major, minor, parseInt(patch) + 1].join('.')")
          node -e "const fs=require('fs'),p=require('./package.json');p.version='${NEW_VERSION}';fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          git add package.json bun.lock
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push

      - name: Back-merge version bump into develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge origin/main --no-edit
          git push origin develop

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v.${{ steps.version.outputs.new_version }}
          name: Release v.${{ steps.version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}