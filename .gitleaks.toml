title = "hammayo.github.io gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Global allowlist"
paths = [
  '''.superpowers/''',
  '''docs/superpowers/''',
]

[[rules.allowlist]]
description = "Allow public GitHub API base URL"
regexes = ['''https://api\.github\.com''']

[[rules.allowlist]]
description = "Allow Google Analytics gtag pattern"
regexes = ['''gtag\(''']
